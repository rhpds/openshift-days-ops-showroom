# Long-running pod that periodically attempts oc exec into an existing workload and runs:
#   touch /etc/passwd
#
# Implemented as a Deployment with a bash loop (sleep between attempts) so failures are logged
# but the container stays Running — no CrashLoopBackOff when touch is denied (e.g. non-root SCC).
#
# Use this when you want DEPLOYMENT_EVENT-style FAM (e.g. fam-basic-deploy-monitoring)
# on a real app pod.
#
# Before applying:
# 1. Set TARGET_NS on every resource (example: payments).
# 2. Set env TARGET_WORKLOAD / TARGET_NAMESPACE / FAM_LOOP_SLEEP_SEC on the Deployment if needed.
# 3. If the image pull fails, switch `image` to something your cluster can pull, e.g.
#    quay.io/openshift/origin-cli:4.16
#
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhacs-fam-exec
  namespace: payments
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rhacs-fam-exec-into-workload
  namespace: payments
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rhacs-fam-exec-into-workload
  namespace: payments
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rhacs-fam-exec-into-workload
subjects:
  - kind: ServiceAccount
    name: rhacs-fam-exec
    namespace: payments
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhacs-fam-exec-runner
  namespace: payments
  labels:
    app.kubernetes.io/name: rhacs-fam-exec-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rhacs-fam-exec-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rhacs-fam-exec-runner
    spec:
      serviceAccountName: rhacs-fam-exec
      containers:
        - name: oc-exec
          image: registry.redhat.io/openshift4/ose-cli-rhel9:v4.16
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              set -u
              NS="${TARGET_NAMESPACE}"
              WORKLOAD="${TARGET_WORKLOAD}"
              CONTAINER="${TARGET_CONTAINER}"
              SLEEP_SEC="${FAM_LOOP_SLEEP_SEC:-600}"
              echo "[$(date -Is)] rhacs-fam-exec-runner starting (sleep ${SLEEP_SEC}s between attempts)"
              while true; do
                if ! oc get "${WORKLOAD}" -n "${NS}" &>/dev/null; then
                  echo "[$(date -Is)] workload not found: ${WORKLOAD} in ${NS} — sleeping ${SLEEP_SEC}s"
                  sleep "${SLEEP_SEC}"
                  continue
                fi
                echo "[$(date -Is)] oc exec -n ${NS} ${WORKLOAD} -- touch /etc/passwd"
                rc=0
                if [ -n "${CONTAINER}" ]; then
                  oc exec -n "${NS}" "${WORKLOAD}" -c "${CONTAINER}" -- touch /etc/passwd || rc=$?
                else
                  oc exec -n "${NS}" "${WORKLOAD}" -- touch /etc/passwd || rc=$?
                fi
                if [ "${rc}" -eq 0 ]; then
                  echo "[$(date -Is)] touch ok"
                else
                  echo "[$(date -Is)] touch failed (rc=${rc}) — non-fatal; sleeping ${SLEEP_SEC}s"
                fi
                sleep "${SLEEP_SEC}"
              done
          env:
            - name: TARGET_NAMESPACE
              value: "payments"
            - name: TARGET_WORKLOAD
              value: "deployment/mastercard-processor"
            - name: TARGET_CONTAINER
              value: ""
            - name: FAM_LOOP_SLEEP_SEC
              value: "600"
