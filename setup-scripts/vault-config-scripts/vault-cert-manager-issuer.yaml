# Self-signed ClusterIssuer for Vault workshop routes (cert-manager).
# Produces a route certificate whose SAN matches the Vault hostname.
# Browsers will still warn until the issuer CA is trusted; there is no CN mismatch.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-lab-issuer
spec:
  selfSigned: {}
